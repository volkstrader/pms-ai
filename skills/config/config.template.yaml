# pms-ai organization config — generated by /onboard (or `pms-ai onboard`).
#
# One install = one org. This file is MACHINE-LOCAL and git-ignored: it holds
# absolute repo paths and your mutable active-project context. Never commit it.
#
# Switch the active project with `pms-ai use <name>`. Add more projects via the
# `config` skill, or by editing the `projects:` map below directly.

organization:
  key: ORG_KEY       # short, alphabetic, spaceless; = the ~/.pms-ai/{key}/ directory name
  name: ORG_NAME     # full human-readable organization name

current_project:     # active project context; `pms-ai use <name>` rewrites this

projects: {}         # name: { repo: ~/path/to/repo }  — ~- or ${VAR}-relative paths preferred
